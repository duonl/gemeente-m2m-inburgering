components:
  schemas:
    Alfabetiseringsonderwijs:
      type: string
      description: "Een traject voor een analfabeet of anders-gealfabetiseerde om\
        \ de basis van de Nederlandse taal te leren als onderdeel van de leerroute.\
        \ Descriptive variant: components/schemas/AlfabetiseringsonderwijsDescription"
      enum:
      - A
      - AA
      - NVT
    AlfabetiseringsonderwijsDescription:
      type: string
      description: Een traject voor een analfabeet of anders-gealfabetiseerde om de
        basis van de Nederlandse taal te leren als onderdeel van de leerroute.
      enum:
      - Onderwijs voor analfabeet
      - Onderwijs voor anders-analfabeet
      - Niet van toepassing
      x-enum-varnames:
      - A
      - AA
      - NVT
    Foutmelding:
      required:
      - fouttekst
      type: object
      properties:
        fouttekst:
          maxLength: 200
          type: string
          description: Uitleg van een functionele foutsituatie
    Gemeente:
      required:
      - gemeentecode
      - pip
      type: object
      properties:
        gemeentecode:
          maxLength: 4
          minLength: 4
          pattern: "\\d{4}"
          type: string
          description: De numerieke aanduiding van de gemeente.
        pip:
          $ref: "#/components/schemas/PIP"
    Leerroute:
      type: string
      description: "De Leerroute is een traject (B1-Route, Onderwijsroute of Zelfstandigheidsroute)\
        \ om te waarborgen dat een Inburgeringsplichtige op het voor hem/haar hoogst\
        \ haalbare niveau kan inburgeren."
      enum:
      - B
      - O
      - Z
    NiveauPip:
      type: string
      description: "Het minimaal te behalen niveau van alle examenonderdelen (taal,\
        \ exclusief KNM) binnen de B1-Route door de Inburgeraar."
      enum:
      - A2
      - B1
    PIP:
      required:
      - dagtekeningPip
      - leerroute
      type: object
      properties:
        dagtekeningPip:
          type: string
          description: De datum wanneer het document ondertekend is.
          format: date
        leerroute:
          $ref: "#/components/schemas/Leerroute"
        niveau:
          $ref: "#/components/schemas/NiveauPip"
        geschatteIntensiteitB1Route:
          maximum: 9999
          minimum: 1
          type: integer
          description: "Is een schatting van het totaal aantal uren voor het afronden\
            \ van B1-Route (taalcursus en KNM).  Alleen voor Asielstatushouder.; Verbijzondering\
            \ van: Een bepaalde, uit afzonderlijk telbare eenheden bestaande hoeveelheid."
          format: int32
        indicatorMagOpleidingAfmaken:
          type: boolean
          description: "De inburgeraar die al een niet-vrijstellende opleiding volgt,\
            \ mag de opleiding afmaken voordat hij of zij met de gekozen leerroute\
            \ start; Verbijzondering van: Algemeen gegevenstype voor het vastleggen\
            \ van een boolean waarde"
        indicatorAlfabetiseringsonderwijs:
          $ref: "#/components/schemas/Alfabetiseringsonderwijs"
  parameters:
    BerichtId:
      name: berichtId
      in: header
      description: Unieke identificatie ten aanzien van traceerbaarheid en beheer
        op het verzoek- en antwoordbericht. Het berichtId wordt bij elk verzoekbericht
        willekeurig gegenereerd. In het antwoordbericht wordt vervolgens hetzelfde
        berichtId teruggegeven als het verzoekbericht.
      required: true
      schema:
        type: string
        description: Universeel unieke identificatie in hexadecimale getallen.
        format: uuid
    Bron:
      name: bron
      in: header
      description: Bron organisatie waar het bericht vandaan komt.
      required: true
      schema:
        maxLength: 20
        minLength: 20
        type: string
        description: Het OIN (Organisatie-identificatienummer) is een uniek identificerend
          nummer dat gebruikt wordt door overheidspartijen of organisaties met een
          publieke taak in de digitale communicatie met andere publieke of private
          partijen
    Bsn:
      name: bsn
      in: path
      required: true
      schema:
        maxLength: 9
        minLength: 9
        pattern: "\\d{9}"
        type: string
        description: Het burgerservicenummer (BSN) is het nummer dat de natuurlijke
          persoon uniek identificeert in overheidsadministraties.
    Doel:
      name: doel
      in: header
      description: Doel organisatie waar het bericht voor bestemd is.
      required: true
      schema:
        maxLength: 20
        minLength: 20
        type: string
        description: Het OIN (Organisatie-identificatienummer) is een uniek identificerend
          nummer dat gebruikt wordt door overheidspartijen of organisaties met een
          publieke taak in de digitale communicatie met andere publieke of private
          partijen
