openapi: 3.0.0
info:
  title: PIP API
  description: "Met deze API kan het actueel  Persoonlijk Plan Inburgering en Participatie\
    \ (PIP) van een persoon worden geraadpleegd en gemuteerd.\n\nHet Persoonlijk Plan\
    \ Inburgering en \nParticipatie (PIP) is een Beschikking van een Gemeente en bevat:\
    \ \n• de vastgestelde Leerroute;\n• de Begeleiding en Ondersteuning die de Gemeente\
    \ biedt aan de Inburgeraar; en \n• de invulling en intensiteit van het PVT en\
    \ de MAP\nvoor de Inburgeraar.\nWet inburgering (2021), artikel 15."
  version: 1.2.0
paths:
  /personen/{bsn}/PIP:
    get:
      tags:
      - PIP
      summary: Opvragen van het PIP die momenteel bij DUO bekend is voor een persoon.
        Dit kan ook een PIP van een voorgaande gemeente betreffen.
      operationId: getPipByBsn
      parameters:
      - $ref: "#/components/parameters/Bsn"
      - $ref: "#/components/parameters/Bron"
      - $ref: "#/components/parameters/BerichtId"
      - $ref: "#/components/parameters/Doel"
      responses:
        "200":
          description: OK
          headers:
            API-Version:
              description: Volledige versienummer van de gebruikte API
              required: true
              schema:
                maxLength: 255
                minLength: 1
                pattern: "^(0|[1-9]\\d*)\\.(0|[1-9]\\d*)\\.(0|[1-9]\\d*)(?:-((?:0|[1-9]\\\
                  d*|\\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\\.(?:0|[1-9]\\d*|\\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\\\
                  +([0-9a-zA-Z-]+(?:\\.[0-9a-zA-Z-]+)*))?$"
                type: string
                description: "Een versienummer met drie onderdelen (MAJOR.MINOR.PATCH),\
                  \ dat gebruikt wordt om de aard van wijzigingen in software aan\
                  \ te geven."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Gemeente"
        "400":
