components:
  schemas:
    Alfabetiseringsonderwijs:
      type: string
      description: Een traject voor een analfabeet of anders-gealfabetiseerde om de
        basis van de Nederlandse taal te leren als onderdeel van de leerroute.
      enum:
      - A
      - AA
      - NVT
    Foutmelding:
      type: object
      properties:
        fouttekst:
          maxLength: 200
          type: string
          description: Uitleg van een functionele foutsituatie
    Inburgeringsaanbod:
      required:
      - indicatorAlfabetiseringsonderwijs
      type: object
      properties:
        datumInburgeringsaanbod:
          type: string
          description: "De inschrijfdatum van een Asielstatushouder bij een Cursusinstelling\
            \ voor een cursus of een opleiding. \n\nVoor B1- en Z-route is de datum\
            \ inburgeringsaanbod tevens de startdatum voor het taalonderwijs en KNM.;\
            \ Verbijzondering van: De datum die het begin van de periode aangeeft\
            \ (inclusief)."
          format: date
        verwachteStartdatumOpleiding:
          type: string
          description: "De datum waarop de de cursus of opleiding uit het Inburgeringsaanbod\
            \ start.; Verbijzondering van: De datum die het begin van de periode aangeeft\
            \ (inclusief)."
          format: date
        verwachteEinddatumOpleiding:
          type: string
          description: "De verwachte datum waarop de de cursus of opleiding uit het\
            \ Inburgeringsaanbod (voortijdig) eindigd.; Verbijzondering van: De datum\
            \ die het einde van de periode aangeeft (exclusief)."
          format: date
        indicatorAlfabetiseringsonderwijs:
          $ref: "#/components/schemas/Alfabetiseringsonderwijs"
    Instelling:
      required:
      - instellingsnummer
      - naam
      - postcode
      - huisnummer
      - plaatsnaam
      type: object
      properties:
        instellingsnummer:
          maxLength: 10
          minLength: 10
          type: string
          description: "Een uniek nummer dat een Cursusinstelling identificeert; Verbijzondering\
            \ van: Uniek identificatienummer waaronder een zakenrelatie in het Informatiesysteem\
            \ Inburgering is geregistreerd."
        naam:
          maxLength: 128
          minLength: 1
          type: string
          description: Algemeen gegevenstype voor het vastleggen van een naam.
        postcode:
          maxLength: 6
          pattern: "([1-9]{1}[0-9]{3}[A-Z]{2})"
          type: string
          description: De door de Post NL vastgestelde code behorend bij de straatnaam
            en het huisnummer dan wel de door Post NL vastgestelde code behorende
            bij een bepaalde combinatie van een naam openbare ruimte en een huisnummer.
        huisnummer:
          maximum: 99999
          minimum: 1
          type: integer
          description: De numerieke aanduiding zoals deze door het gemeentebestuur
            aan het object is toegekend.
          format: int32
        huisnummertoevoeging:
          maxLength: 4
          minLength: 1
          type: string
          description: "Die letters of tekens die noodzakelijk zijn om, naast het\
            \ juiste huisnummer en huisletter, de brievenbus te vinden."
        plaatsnaam:
          maxLength: 40
          minLength: 1
          type: string
          description: De naam van de plaats.
        bow:
          minLength: 1
          pattern: "^\\d{1,10}$"
          type: string
          description: "Registratienummer van de cursusinstelling bij Stichting Blik\
            \ op Werk; Verbijzondering van: Unieke identificatie van een organisatie\
            \ door een registratienummer. "
        brin:
          maxLength: 4
          minLength: 4
          pattern: "([0-9]{2}[A-Z]{2})"
          type: string
          description: Een unieke identificatie voor een onderwijsinstellingserkenning
            in de Registratie Instellingen en Opleidingen.
        indicatieBowKeurmerk:
          type: boolean
          description: "Indicatie of de instelling over een BoW keurmerk beschikt.;\
            \ Verbijzondering van: Algemeen gegevenstype voor het vastleggen van een\
            \ boolean waarde"
        indicatieTstKeurmerk:
          type: boolean
          description: "Indicatie of de instelling over een Taalschakeltraject keurmerk\
            \ beschikt.; Verbijzondering van: Algemeen gegevenstype voor het vastleggen\
            \ van een boolean waarde"
  parameters:
    BerichtId:
      name: berichtId
      in: header
      description: Unieke identificatie ten aanzien van traceerbaarheid en beheer
        op het verzoek- en antwoordbericht. Het berichtId wordt bij elk verzoekbericht
        willekeurig gegenereerd. In het antwoordbericht wordt vervolgens hetzelfde
        berichtId teruggegeven als het verzoekbericht.
      required: true
      schema:
        type: string
        description: Universeel unieke identificatie in hexadecimale getallen.
        format: uuid
    Bron:
      name: bron
      in: header
      description: Bron organisatie waar het bericht vandaan komt.
      required: true
      schema:
        maxLength: 20
        minLength: 20
        type: string
        description: Het OIN (Organisatie-identificatienummer) is een uniek identificerend
          nummer dat gebruikt wordt door overheidspartijen of organisaties met een
          publieke taak in de digitale communicatie met andere publieke of private
          partijen
    Bsn:
      name: bsn
      in: path
      required: true
      schema:
        maxLength: 9
        minLength: 9
        pattern: "\\d{9}"
        type: string
        description: Het burgerservicenummer (BSN) is het nummer dat de natuurlijke
          persoon uniek identificeert in overheidsadministraties.
    Doel:
      name: doel
      in: header
      description: Doel organisatie waar het bericht voor bestemd is.
      required: true
      schema:
        maxLength: 20
        minLength: 20
        type: string
        description: Het OIN (Organisatie-identificatienummer) is een uniek identificerend
          nummer dat gebruikt wordt door overheidspartijen of organisaties met een
          publieke taak in de digitale communicatie met andere publieke of private
          partijen
    Instellingsnummer:
      name: instellingsnummer
      in: path
      required: true
      schema:
        maxLength: 10
        minLength: 10
        type: string
        description: Uniek identificatienummer waaronder een zakenrelatie in het Informatiesysteem
          Inburgering is geregistreerd.
