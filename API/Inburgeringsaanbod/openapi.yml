#2026-02-09_Inburgeringsaanbod_rev10675
openapi: 3.0.0
info:
  title: Inburgeringsaanbod API
  description: "Met deze API kan het inburgeringsaanbod gemuteerd worden. \n\nHet\
    \ inburgeringsaanbod betreft de cursus(sen) of opleiding(en) bij een Cursusinstelling\
    \ die de Gemeente aanbiedt bij de Inburgeraar waarmee de Inburgeraar de op grond\
    \ van artikel 15 vastgestelde Leerroute in het PIP kan voldoen. \n\nWet inburgering\
    \ (2021), artikel 16."
  version: 1.2.0
paths:
  /instellingen:
    get:
      tags:
      - Instellingen
      summary: Raadplegen van een lijst met bekende instellingen met een BoW en/of
        TST keurmerk.
      operationId: getInstellingen
      parameters:
      - $ref: "#/components/parameters/Bron"
      - $ref: "#/components/parameters/BerichtId"
      - $ref: "#/components/parameters/Doel"
      responses:
        "200":
          description: OK
          headers:
            API-Version:
              description: Volledige versienummer van de gebruikte API
              required: true
              schema:
                maxLength: 255
                minLength: 1
                pattern: "^(0|[1-9]\\d*)\\.(0|[1-9]\\d*)\\.(0|[1-9]\\d*)(?:-((?:0|[1-9]\\\
                  d*|\\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\\.(?:0|[1-9]\\d*|\\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\\\
                  +([0-9a-zA-Z-]+(?:\\.[0-9a-zA-Z-]+)*))?$"
                type: string
                description: "Een versienummer met drie onderdelen (MAJOR.MINOR.PATCH),\
                  \ dat gebruikt wordt om de aard van wijzigingen in software aan\
                  \ te geven."
          content:
            application/json:
              schema:
                maxItems: 200
                type: array
                items:
                  $ref: "#/components/schemas/Instelling"
