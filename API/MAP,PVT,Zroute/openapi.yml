components:
  schemas:
    DatumMap:
      required:
      - datumEindgesprekMap
      type: object
      properties:
        datumEindgesprekMap:
          type: string
          description: "De datum waarop een eindgesprek tussen de Inburgeraar en de\
            \ Gemeente is. ; Verbijzondering van: Algemeen gegevenstype voor het vastleggen\
            \ van een datum."
          format: date
    DatumPvt:
      required:
      - datumOndertekeningPvt
      type: object
      properties:
        datumOndertekeningPvt:
          type: string
          description: "De datum van ondertekening van het participatieverklaringstraject\
            \ ; Verbijzondering van: Algemeen gegevenstype voor het vastleggen van\
            \ een datum."
          format: date
    Foutmelding:
      required:
      - fouttekst
      type: object
      properties:
        fouttekst:
          maxLength: 200
          type: string
          description: Uitleg van een functionele foutsituatie
    InburgeringJaNeeType:
      type: string
      description: Geeft een resultaat aan in het kader van inburgering.
      enum:
      - Ja
      - Nee
    ResultaatMap:
      type: object
      properties:
        datumEindgesprekMap:
          type: string
          description: "De datum waarop een eindgesprek tussen de Inburgeraar en de\
            \ Gemeente is.; Verbijzondering van: Algemeen gegevenstype voor het vastleggen\
            \ van een datum."
          format: date
        verwijtbaar:
          $ref: "#/components/schemas/InburgeringJaNeeType"
    ResultaatPvt:
      type: object
      properties:
        datumOndertekeningPvt:
          type: string
          description: "De datum van ondertekening van het participatieverklaringstraject\
            \ ; Verbijzondering van: Algemeen gegevenstype voor het vastleggen van\
            \ een datum."
          format: date
        verwijtbaar:
          $ref: "#/components/schemas/InburgeringJaNeeType"
    ResultaatZroute:
      type: object
      properties:
        datumAfrondingZroute:
          type: string
          description: "De datum waarop Inburgeraar de Z-route afrondt.; Verbijzondering\
            \ van: Algemeen gegevenstype voor het vastleggen van een datum."
          format: date
  parameters:
    BerichtId:
      name: berichtId
      in: header
      description: Unieke identificatie ten aanzien van traceerbaarheid en beheer
        op het verzoek- en antwoordbericht. Het berichtId wordt bij elk verzoekbericht
        willekeurig gegenereerd. In het antwoordbericht wordt vervolgens hetzelfde
        berichtId teruggegeven als het verzoekbericht.
      required: true
      schema:
        type: string
        description: Universeel unieke identificatie in hexadecimale getallen.
        format: uuid
    Bron:
      name: bron
      in: header
      description: Bron organisatie waar het bericht vandaan komt.
      required: true
      schema:
        maxLength: 20
        minLength: 20
        type: string
        description: Het OIN (Organisatie-identificatienummer) is een uniek identificerend
          nummer dat gebruikt wordt door overheidspartijen of organisaties met een
          publieke taak in de digitale communicatie met andere publieke of private
          partijen
    Bsn:
      name: bsn
      in: path
      required: true
      schema:
        maxLength: 9
        minLength: 9
        pattern: "\\d{9}"
        type: string
        description: Het burgerservicenummer (BSN) is het nummer dat de natuurlijke
          persoon uniek identificeert in overheidsadministraties.
    Doel:
      name: doel
      in: header
      description: Doel organisatie waar het bericht voor bestemd is.
      required: true
      schema:
        maxLength: 20
        minLength: 20
        type: string
