#2024-11-06_Leerbaarheidstoets_rev4586
openapi: 3.0.0
info:
  title: Leerbaarheidstoets API
  description: "Deze API is bestemd voor het opvragen van een persoon zijn examennummer\
    \ ten behoeve van het inplannen van de leerbaarheidstoets (LBT) en voor het raadplegen\
    \ van leerbaarheidstoetsresultaten.\nDe leerbaarheidstoets is een onderdeel van\
    \ de Brede Intake en geeft inzicht in het te behalen niveau van de Nederlandse\
    \ taal van het Gemeenschappelijk Europees Referentiekader voor Moderne Vreemde\
    \ talen binnen de Inburgeringstermijn. Wet inburgering (2021), artikel 14, lid\
    \ 3."
  version: 1.2.0
paths:
  /personen/{bsn}/lbt/examennummer:
    get:
      tags:
      - Examennummer
      summary: Opvragen van een examennummer van een persoon voor het inplannen van
        de LBT
      operationId: getExamennummerByBsn
