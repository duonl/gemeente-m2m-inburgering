components:
  schemas:
    Examennummer:
      required:
      - examennummer
      type: object
      properties:
        examennummer:
          maxLength: 12
          type: string
          description: Unieke identificatie voor een examen.
    LeerbaarheidstoetsResultaat:
      type: string
      description: Uitslag van een toets die de inburgeringsplichtige moet doen om
        inzicht te geven in het niveau van de Nederlandse taal dat een inburgeringsplichtige
        kan bereiken gedurende de inburgeringstermijn.
      enum:
      - B1-route haalbaar
      - B1-route niet haalbaar
      - Onbekend
    Resultaat:
      required:
      - behaaldeScore
      - benodigdeScore
      - datumAfname
      - resultaat
      type: object
      properties:
        resultaat:
          $ref: '#/components/schemas/LeerbaarheidstoetsResultaat'
        behaaldeScore:
          maxLength: 6
          minLength: 1
          pattern: "^(\\d{1,3}\\,\\d{2})$"
          type: string
          description: De score die is behaald op een toets of examen in het kader
            van Inburgering.
        benodigdeScore:
          maxLength: 6
          minLength: 1
          pattern: "^(\\d{1,3}\\,\\d{2})$"
          type: string
          description: "De grenswaarde vanaf waar de B1 route mogelijk zou moeten\
            \ zijn.; Verbijzondering van: De score die is behaald op een toets of\
            \ examen in het kader van Inburgering."
        datumAfname:
          type: string
          description: "De datum waarop de uitslag van de leerbaarheidstoets is geregistreerd\
            \ door DUO; Verbijzondering van: Algemeen gegevenstype voor het vastleggen\
            \ van een datum."
          format: date
  parameters:
    API-Version:
      name: API-Version
      in: header
      description: Volledige versienummer van de gebruikte API
      required: true
      schema:
        maxLength: 255
        minLength: 1
        pattern: "^(0|[1-9]\\d*)\\.(0|[1-9]\\d*)\\.(0|[1-9]\\d*)(?:-((?:0|[1-9]\\\
          d*|\\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\\.(?:0|[1-9]\\d*|\\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\\\
          +([0-9a-zA-Z-]+(?:\\.[0-9a-zA-Z-]+)*))?$"
        type: string
        description: "Een versienummer met drie onderdelen (MAJOR.MINOR.PATCH), dat\
          \ gebruikt wordt om de aard van wijzigingen in software aan te geven."
    BerichtId:
      name: berichtId
      in: header
      description: Unieke identificatie ten aanzien van traceerbaarheid en beheer
        op het verzoek- en antwoordbericht. Het berichtId kan bij elk verzoekbericht
        willekeurig gegenereerd worden om vervolgens terug te geven bij het gerelateerde
        antwoordbericht.
      required: true
      schema:
        maxLength: 36
        minLength: 36
        type: string
        description: Universeel unieke identificatie in hexadecimale getallen.
        format: uuid
    Bron:
      name: bron
      in: header
      description: Bron organisatie waar het bericht vandaan komt.
      required: true
      schema:
        maxLength: 20
        minLength: 20
        type: string
        description: Het OIN (Organisatie-identificatienummer) is een uniek identificerend
          nummer dat gebruikt wordt door overheidspartijen of organisaties met een
          publieke taak in de digitale communicatie met andere publieke of private
          partijen
    Bsn:
      name: bsn
      in: path
      required: true
      schema:
        maxLength: 9
        minLength: 9
        pattern: "\\d{9}"
        type: string
        description: Het burgerservicenummer (BSN) is het nummer dat de natuurlijke
          persoon uniek identificeert in overheidsadministraties.
    Doel:
      name: doel
      in: header
      description: Doel organisatie waar het bericht voor bestemd is.
      required: true
      schema:
        maxLength: 20
        minLength: 20
        type: string
        description: Het OIN (Organisatie-identificatienummer) is een uniek identificerend
          nummer dat gebruikt wordt door overheidspartijen of organisaties met een
          publieke taak in de digitale communicatie met andere publieke of private
          partijen
