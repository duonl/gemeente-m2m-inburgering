#2026-03-30_Gevolgde uren_rev11354
openapi: 3.0.0
info:
  title: Gevolgde Uren API
  description: Met deze API kunnen de gevolgde uren van de inburgeringsplichtige worden
    doorgegeven of worden geraadpleegd.
  version: 1.0.0
