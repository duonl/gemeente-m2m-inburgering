components:
  schemas:
    Gemeente:
      type: object
      properties:
        gemeentecode:
          maxLength: 4
          minLength: 4
          pattern: "\\d{4}"
          type: string
          description: De numerieke aanduiding van de gemeente.
        bekendTot:
          type: string
          description: "De uren van deze gemeente zijn bekend tot deze datum; Verbijzondering\
            \ van: De datum die het einde van de periode aangeeft (exclusief)."
          format: date
        ParticipatieAlsTaalles:
          $ref: "#/components/schemas/ParticipatieAlsTaalles"
        ParticipatieactiviteitenBredeIntake:
          $ref: "#/components/schemas/ParticipatieactiviteitenBredeIntake"
        TaallesEnKnmBredeIntake:
          $ref: "#/components/schemas/TaallesEnKnmBredeIntake"
    ParticipatieAlsTaalles:
      required:
      - uren
      type: object
      properties:
        uren:
          maximum: 9999
          minimum: 0
          type: integer
          description: "Het totaal aantal gevolgde uren taalles Nederlands en KNM\
            \ door een Inburgeraar bij een Cursusinstelling in het kader van de gevolgde\
            \ Leerroute. \nBij het schakelen naar een andere Leerroute tellen de gevolgde\
            \ taaluren en KNM uit de vorige Leerroute ook mee bij het totaal aantal.\
            \ Voor de onderwijsroute zijn dit alles lesuren, dus inclusief deficiente\
            \ vakken.\n\nDe uren uit Brede Intake tellen niet mee.; Verbijzondering\
            \ van: Een bepaalde, uit afzonderlijk telbare eenheden bestaande hoeveelheid."
          format: int32
    ParticipatieactiviteitenBredeIntake:
      required:
      - uren
      type: object
      properties:
        uren:
          maximum: 9999
          minimum: 0
          type: integer
          description: |-
            Het totaal aantal uren gevolgde participatieactiviteiten ten behoeve van de Z-Route (waaronder activiteiten voor maatschappelijke begeleiding en de Participatiewet) van de Asielstatushouder.
            De uren uit Brede Intake tellen  mee (Besluit, artikel 3.14).; Verbijzondering van: Een bepaalde, uit afzonderlijk telbare eenheden bestaande hoeveelheid.
          format: int32
    TaallesEnKnmBredeIntake:
      required:
      - uren
      type: object
      properties:
        uren:
          maximum: 9999
          minimum: 0
          type: integer
          description: "Het totaal aantal gevolgde cursusuren Nederlands als tweede\
            \ taal en KNM (eventueel met alfabetiseringsonderwijs) tijdens de Brede\
            \ Intake die een Inburgeraar bij een Gemeente heeft gevolgd.; Verbijzondering\
            \ van: Een bepaalde, uit afzonderlijk telbare eenheden bestaande hoeveelheid."
          format: int32
  parameters:
    BerichtId:
      name: berichtId
      in: header
      description: Unieke identificatie ten aanzien van traceerbaarheid en beheer
        op het verzoek- en antwoordbericht. Het berichtId wordt bij elk verzoekbericht
        willekeurig gegenereerd. In het antwoordbericht wordt vervolgens hetzelfde
        berichtId teruggegeven als het verzoekbericht.
      required: true
      schema:
        type: string
        description: Universeel unieke identificatie in hexadecimale getallen.
        format: uuid
    Bron:
      name: bron
      in: header
      description: Bron organisatie waar het bericht vandaan komt.
      required: true
      schema:
        maxLength: 20
        minLength: 20
        type: string
        description: Het OIN (Organisatie-identificatienummer) is een uniek identificerend
          nummer dat gebruikt wordt door overheidspartijen of organisaties met een
          publieke taak in de digitale communicatie met andere publieke of private
          partijen
    Bsn:
      name: bsn
      in: path
      required: true
      schema:
        maxLength: 9
        minLength: 9
        pattern: "\\d{9}"
        type: string
        description: Het burgerservicenummer (BSN) is het nummer dat de natuurlijke
          persoon uniek identificeert in overheidsadministraties.
    Doel:
      name: doel
      in: header
      description: Doel organisatie waar het bericht voor bestemd is.
      required: true
      schema:
        maxLength: 20
        minLength: 20
        type: string
        description: Het OIN (Organisatie-identificatienummer) is een uniek identificerend
          nummer dat gebruikt wordt door overheidspartijen of organisaties met een
          publieke taak in de digitale communicatie met andere publieke of private
          partijen
