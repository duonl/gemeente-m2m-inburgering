      type: object
      properties:
        indicatorInburgeringsplicht:
          type: boolean
          description: "Vreemdeling heeft wel of geen Inburgeringsplicht.; Verbijzondering\
            \ van: Algemeen gegevenstype voor het vastleggen van een boolean waarde"
        begindatum:
          type: string
          description: De datum die het begin van de periode aangeeft (inclusief).
          format: date
        einddatum:
          type: string
          description: De datum die het einde van de periode aangeeft (inclusief).
          format: date
        wijzigingsdatum:
          type: string
          description: "De datum waarop de inburgeringsplicht voor het laatst gewijzigd\
            \ is.; Verbijzondering van: Algemeen gegevenstype voor het vastleggen\
            \ van een datum."
          format: date
        datumKennisgevingInburgeringsplicht:
          type: string
          description: Is de datum waarop iets is verstuurd.
          format: date
        redenGeenInburgeringsplicht:
          $ref: '#/components/schemas/RedenGeenInburgeringsplicht'
    Inburgeringsplichthistorie:
      required:
      - indicatorInburgeringsplicht
      type: object
      properties:
        indicatorInburgeringsplicht:
          type: boolean
          description: "Vreemdeling heeft wel of geen Inburgeringsplicht.; Verbijzondering\
            \ van: Algemeen gegevenstype voor het vastleggen van een boolean waarde"
        begindatum:
          type: string
          description: De datum die het begin van de periode aangeeft (inclusief).
          format: date
        einddatum:
          type: string
          description: De datum die het einde van de periode aangeeft (inclusief).
          format: date
        wijzigingsdatum:
          type: string
          description: "De datum waarop de inburgeringsplicht voor het laatst gewijzigd\
            \ is.; Verbijzondering van: Algemeen gegevenstype voor het vastleggen\
            \ van een datum."
          format: date
    RedenGeenInburgeringsplicht:
      type: string
      description: De reden waarom een vreemdeling geen inburgeringsplicht (meer)
        heeft.
      enum:
      - Volledige ontheffing
      - Volledige vrijstelling
      - Inburgeringsplicht voldaan
      - Verblijfsdoel gewijzigd
      - Vertrek uit Nederland langer dan een jaar
      - Overlijden
      - Overig
      - Tijdelijke vrijstelling
  parameters:
    API-Version:
      name: API-Version
      in: header
      description: Volledige versienummer van de gebruikte API
      required: true
      schema:
        maxLength: 255
        minLength: 1
        pattern: "^(0|[1-9]\\d*)\\.(0|[1-9]\\d*)\\.(0|[1-9]\\d*)(?:-((?:0|[1-9]\\\
          d*|\\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\\.(?:0|[1-9]\\d*|\\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\\\
          +([0-9a-zA-Z-]+(?:\\.[0-9a-zA-Z-]+)*))?$"
        type: string
        description: "Een versienummer met drie onderdelen (MAJOR.MINOR.PATCH), dat\
          \ gebruikt wordt om de aard van wijzigingen in software aan te geven."
    BerichtId:
      name: berichtId
      in: header
      description: Unieke identificatie ten aanzien van traceerbaarheid en beheer
        op het verzoek- en antwoordbericht. Het berichtId wordt bij elk verzoekbericht
        willekeurig gegenereerd. In het antwoordbericht wordt vervolgens hetzelfde
        berichtId teruggegeven als het verzoekbericht.
      required: true
      schema:
        type: string
        description: Universeel unieke identificatie in hexadecimale getallen.
        format: uuid
    Bron:
      name: bron
      in: header
      description: Bron organisatie waar het bericht vandaan komt.
      required: true
      schema:
        maxLength: 20
        minLength: 20
        type: string
        description: Het OIN (Organisatie-identificatienummer) is een uniek identificerend
          nummer dat gebruikt wordt door overheidspartijen of organisaties met een
          publieke taak in de digitale communicatie met andere publieke of private
          partijen
    Bsn:
      name: bsn
      in: path
      required: true
      schema:
        maxLength: 9
        minLength: 9
        pattern: "\\d{9}"
        type: string
        description: Het burgerservicenummer (BSN) is het nummer dat de natuurlijke
          persoon uniek identificeert in overheidsadministraties.
    Doel:
      name: doel
      in: header
      description: Doel organisatie waar het bericht voor bestemd is.
      required: true
      schema:
        maxLength: 20
        minLength: 20
        type: string
        description: Het OIN (Organisatie-identificatienummer) is een uniek identificerend
          nummer dat gebruikt wordt door overheidspartijen of organisaties met een
          publieke taak in de digitale communicatie met andere publieke of private
          partijen
