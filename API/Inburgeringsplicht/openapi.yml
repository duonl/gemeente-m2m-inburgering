#2025-03-31_Inburgeringsplicht Gemeente_rev6264
openapi: 3.0.0
info:
  title: Inburgeringsplicht API
  description: "Met deze API kan worden geraadpleegd of een persoon inburgeringsplichtig\
    \ is en onder welke doelgroep degene valt. \nInburgeringsplicht is een plicht\
    \ voor een Inburgeraar tot het afronden van het participatieverklaringstraject,\
    \ het afronden van de module Arbeidsmarkt en Participatie en het behalen van het\
    \ Inburgeringsexamen (B1-Route), de Onderwijsroute of de Zelfredzaamheidsroute.\n\
    Bron: Wet inburgering (2021), artikel 6"
  version: 1.2.2
paths:
  /personen/{bsn}/doelgroep:
