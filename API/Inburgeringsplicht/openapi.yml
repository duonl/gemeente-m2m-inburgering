components:
  schemas:
    AsielrechtenWijzigingVerblijfsdoel:
      type: string
      description: Specificatie van de rechten die voor de inburgeraar worden gehanteerd
        na een wijziging in het verblijfsdoel.
      enum:
      - Asielrechten toegekend
      - Behoud asielrechten
      - Op verzoek behoud rechten van gezins- en overige migrant
      - Op verzoek rechten van gezins- en overige migrant toegekend
    Doelgroep:
      type: object
      properties:
        indeling:
          $ref: '#/components/schemas/Doelgroepindeling'
        begindatum:
          type: string
          description: De datum die het begin van de periode aangeeft (inclusief).
          format: date
        gedetailleerdeDoelgroep:
          $ref: '#/components/schemas/GedetailleerdeDoelgroep'
        asielrechtenWijzigingVerblijfsdoel:
          $ref: '#/components/schemas/AsielrechtenWijzigingVerblijfsdoel'
    Doelgroephistorie:
      type: object
      properties:
        indeling:
          $ref: '#/components/schemas/Doelgroepindeling'
        begindatum:
          type: string
          description: De datum die het begin van de periode aangeeft (inclusief).
          format: date
        einddatum:
          type: string
          description: De datum die het einde van de periode aangeeft (inclusief).
          format: date
    Doelgroepindeling:
      type: string
      description: Een indeling naar verblijfsdoel van een inburgeraar met het onderscheid
        tussen de verschillende groepswaarden die de Wi2021 maakt.
      enum:
      - Asielstatushouder
      - Gezinsmigrant en overige migrant
    GedetailleerdeDoelgroep:
      type: string
      description: "In de Wet inburgering 2021 wordt voor een inburgeraar twee doelgroepen\
        \ onderkend: de asielstatushouder of de Gezinsmigrant en de Overige Migrant.\
        \ DUO zelf heeft een fijnmaziger onderverdeling in doelgroepen die interessant\
        \ zijn voor monitoring en evaluatie doeleinden en COA. DUO stelt de doelgroep\
        \ van een inburgeraar o.a. vast met behulp van het verblijfsdoel."
      enum:
      - Asielstatushouder
      - Geestelijk bedienaar
      - Gezinshereniger
      - Gezinshereniger met Asielstatushouder
      - Gezinsvormer
      - Gezinsvormer met Asielstatushouder
      - Overig
    Inburgeringsplicht:
      required:
