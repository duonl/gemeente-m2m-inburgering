components:
  schemas:
    Contactpersoon:
      required:
      - contactpersoongegevens
      type: object
      properties:
        id:
          maximum: 99999
          minimum: 1
          type: integer
          description: De unieke aanduiding van een functionaris van een organisatie
            met wie er contact (geweest) is.
          format: int32
        contactpersoongegevens:
          $ref: '#/components/schemas/Contactpersoongegevens'
    Contactpersoongegevens:
      required:
      - naam
      - email
      - telefoonnummer
      type: object
      properties:
        naam:
          maxLength: 100
          pattern: "[\\s'‘.\\p{L}\\p{Pd}]{0,100}"
          type: string
          description: De naam van de persoon die op enige wijze is aangemerkt als
            contactpersoon voor een organisatie of een mens.
        email:
          maxLength: 241
          minLength: 4
          type: string
          description: Het alias van de locatie waar digitale boodschappen kunnen
            worden afgeleverd (zoals gebruikt door Inburgering)
        telefoonnummer:
          maxLength: 22
          minLength: 3
          pattern: "^(\\+|[0-9])((\\s|\\s?(-|\\(0\\))\\s?)?[0-9]){2,15}([,][1-9][0-9]{1,8})?$"
          type: string
          description: Het geheel aan cijfers en tekens waarmee wordt aangeduid hoe
            een persoon via telefonie kan worden bereikt.
    Foutmelding:
      required:
      - fouttekst
      type: object
      properties:
        fouttekst:
          maxLength: 200
          type: string
          description: Uitleg van een functionele foutsituatie
  parameters:
    BerichtId:
      name: berichtId
      in: header
      description: Unieke identificatie ten aanzien van traceerbaarheid en beheer
        op het verzoek- en antwoordbericht. Het berichtId wordt bij elk verzoekbericht
        willekeurig gegenereerd. In het antwoordbericht wordt vervolgens hetzelfde
        berichtId teruggegeven als het verzoekbericht.
      required: true
      schema:
        type: string
        description: Universeel unieke identificatie in hexadecimale getallen.
        format: uuid
    Bron:
      name: bron
      in: header
      description: Bron organisatie waar het bericht vandaan komt.
      required: true
      schema:
        maxLength: 20
        minLength: 20
        type: string
        description: Het OIN (Organisatie-identificatienummer) is een uniek identificerend
          nummer dat gebruikt wordt door overheidspartijen of organisaties met een
          publieke taak in de digitale communicatie met andere publieke of private
          partijen
    Bsn:
      name: bsn
      in: path
      required: true
      schema:
        maxLength: 9
        minLength: 9
        pattern: "\\d{9}"
        type: string
        description: Het burgerservicenummer (BSN) is het nummer dat de natuurlijke
          persoon uniek identificeert in overheidsadministraties.
    Doel:
      name: doel
      in: header
      description: Doel organisatie waar het bericht voor bestemd is.
      required: true
      schema:
        maxLength: 20
        minLength: 20
        type: string
        description: Het OIN (Organisatie-identificatienummer) is een uniek identificerend
          nummer dat gebruikt wordt door overheidspartijen of organisaties met een
          publieke taak in de digitale communicatie met andere publieke of private
          partijen
    Id:
      name: id
      in: path
      required: true
      schema:
        maximum: 99999
        minimum: 1
        type: integer
        description: De unieke aanduiding van een functionaris van een organisatie
          met wie er contact (geweest) is.
        format: int32
